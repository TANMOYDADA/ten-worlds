<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ten Worlds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --deep:   #0F0B1E;
  --dark:   #1A1535;
  --panel:  #221D3A;
  --accent: #C084FC;
  --coral:  #F87171;
  --teal:   #34D399;
  --amber:  #F9C74F;
  --muted:  #7B6FA0;
  --white:  #F3F0FF;
  --font-d: 'Playfair Display', Georgia, serif;
  --font-b: 'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  background: var(--deep);
  color: var(--white);
  font-family: var(--font-b);
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; min-height: 100vh; }

#progress-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
}

#nav-dots {
  position: fixed; right: 1.25rem; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 7px;
  z-index: 100;
}
.nav-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(123,111,160,0.35);
  cursor: pointer; transition: all 0.3s;
}
.nav-dot.active { background: var(--accent); transform: scale(1.8); }
.nav-dot.done   { background: rgba(192,132,252,0.35); }

.slide {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 3rem 2rem; position: relative;
  flex-direction: column;
}

/* TITLE */
#slide-title { text-align: center; background: var(--deep); }
.orb { position: absolute; border-radius: 50%; pointer-events: none; }
.orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, rgba(192,132,252,0.07) 0%, transparent 70%); top: -120px; right: -100px; }
.orb-2 { width: 380px; height: 380px; background: radial-gradient(circle, rgba(52,211,153,0.05) 0%, transparent 70%); bottom: -60px; left: -80px; }

.t-eyebrow { font-size:.72rem; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin-bottom:1.5rem; opacity:0; animation:fu .7s .2s forwards; }
.t-main    { font-family:var(--font-d); font-size:clamp(3.5rem,10vw,7rem); font-weight:700; line-height:1; margin-bottom:1.25rem; opacity:0; animation:fu .7s .45s forwards; }
.t-sub     { font-size:1.05rem; color:var(--muted); max-width:400px; line-height:1.6; margin:0 auto 2.5rem; opacity:0; animation:fu .7s .7s forwards; }
.pips-row  { display:flex; gap:9px; justify-content:center; flex-wrap:wrap; max-width:360px; margin:0 auto 2.5rem; opacity:0; animation:fu .7s .9s forwards; }
.pip { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:500; }
.pip.lo { border:1.5px solid var(--coral); color:var(--coral); background:rgba(248,113,113,0.08); }
.pip.hi { border:1.5px solid var(--teal);  color:var(--teal);  background:rgba(52,211,153,0.08); }
.start-btn {
  padding:.8rem 2.4rem; border:1.5px solid var(--accent); border-radius:3rem;
  background:transparent; color:var(--accent); font-family:var(--font-b);
  font-size:.9rem; letter-spacing:.1em; cursor:pointer; transition:all .3s;
  opacity:0; animation:fu .7s 1.1s forwards;
}
.start-btn:hover { background:var(--accent); color:var(--deep); }

/* HOW */
#slide-how { background:var(--dark); }
.how-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; max-width:820px; width:100%; }
.how-card { background:var(--panel); border:.5px solid rgba(192,132,252,0.18); border-radius:1rem; padding:1.75rem 1.25rem; text-align:center; }
.how-num { width:42px; height:42px; border-radius:50%; background:rgba(192,132,252,0.1); border:1.5px solid var(--accent); display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:1.1rem; color:var(--accent); margin:0 auto 1rem; }
.how-title { font-family:var(--font-d); font-size:1rem; margin-bottom:.6rem; }
.how-body  { font-size:.82rem; color:var(--muted); line-height:1.6; }

/* SITUATION */
.sit-slide {
  background:var(--deep); min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:4rem 2rem 3rem; position:relative; text-align:center;
}
.world-counter {
  position:absolute; top:1.5rem; left:50%; transform:translateX(-50%);
  font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted);
  white-space:nowrap;
}
.step-indicator { display:flex; gap:8px; justify-content:center; margin-bottom:2.5rem; }
.step-dot { width:30px; height:3px; border-radius:2px; background:rgba(123,111,160,0.2); transition:background .4s; }
.step-dot.s-active { background:var(--accent); }
.step-dot.s-done   { background:rgba(192,132,252,0.4); }

.sit-situation {
  font-family:var(--font-d); font-weight:700;
  font-size:clamp(1.8rem,4.5vw,3rem);
  line-height:1.25; max-width:680px; margin-bottom:2.5rem;
}

.reveal-btn {
  display:inline-flex; align-items:center; gap:.6rem;
  padding:.75rem 2rem; border-radius:3rem; border:1.5px solid;
  font-family:var(--font-b); font-size:.88rem; letter-spacing:.08em;
  cursor:pointer; transition:all .3s; background:transparent;
}
.reveal-btn.lo-btn { border-color:rgba(248,113,113,0.5); color:var(--coral); }
.reveal-btn.lo-btn:hover { background:rgba(248,113,113,0.1); }
.reveal-btn.hi-btn { border-color:rgba(52,211,153,0.5); color:var(--teal); }
.reveal-btn.hi-btn:hover { background:rgba(52,211,153,0.1); }
.arr-icon { transition:transform .3s; display:inline-block; }
.reveal-btn:hover .arr-icon { transform:translateX(4px); }

.feelings-section { max-width:540px; width:100%; margin-bottom:2.5rem; }
.feelings-label { font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
.feelings-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.65rem; }
.feeling-tile {
  border-radius:.6rem; padding:.85rem .6rem;
  font-family:var(--font-d); font-weight:700; font-size:1rem;
  animation:tileIn .35s ease both;
}
.feeling-tile.lo { background:rgba(248,113,113,0.07); border:1px solid rgba(248,113,113,0.25); color:#F4A0A0; }
.feeling-tile.hi { background:rgba(52,211,153,0.07);  border:1px solid rgba(52,211,153,0.25);  color:#6EEEC0; }
@keyframes tileIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.feeling-tile:nth-child(1){animation-delay:.0s}
.feeling-tile:nth-child(2){animation-delay:.07s}
.feeling-tile:nth-child(3){animation-delay:.14s}
.feeling-tile:nth-child(4){animation-delay:.21s}

.world-reveal-section { max-width:580px; width:100%; margin-bottom:2.5rem; }
.world-reveal-card {
  border-radius:1.2rem; padding:2rem 2.5rem;
  animation:worldIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.world-reveal-card.lo { background:rgba(248,113,113,0.06); border:1.5px solid rgba(248,113,113,0.3); }
.world-reveal-card.hi { background:rgba(52,211,153,0.06);  border:1.5px solid rgba(52,211,153,0.3);  }
@keyframes worldIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }

.world-of   { font-size:.65rem; letter-spacing:.25em; text-transform:uppercase; margin-bottom:.6rem; }
.world-of.lo { color:rgba(248,113,113,0.5); }
.world-of.hi { color:rgba(52,211,153,0.5); }
.world-name { font-family:var(--font-d); font-size:clamp(2rem,5vw,3.2rem); font-weight:700; margin-bottom:.75rem; }
.world-name.lo { color:var(--coral); }
.world-name.hi { color:var(--teal); }
.world-desc { font-size:.88rem; color:var(--muted); line-height:1.7; }
.world-cue  { font-size:.8rem; font-style:italic; color:rgba(255,255,255,0.3); margin-top:.75rem; line-height:1.6; }

.nav-row { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; max-width:500px; width:100%; }
.nbtn {
  padding:.65rem 1.6rem; border-radius:.5rem;
  border:1px solid rgba(123,111,160,0.3);
  background:transparent; color:var(--muted);
  font-family:var(--font-b); font-size:.82rem;
  cursor:pointer; transition:all .2s;
}
.nbtn:hover { background:rgba(123,111,160,0.12); color:var(--white); }
.nbtn.primary { border-color:rgba(192,132,252,0.4); color:var(--accent); }
.nbtn.primary:hover { background:rgba(192,132,252,0.1); }

/* MUTUAL */
#slide-mutual { background:var(--dark); }
.mutual-inner { max-width:700px; width:100%; }
.mutual-card {
  background:var(--panel); border:.5px solid rgba(192,132,252,0.15);
  border-radius:.9rem; padding:1.4rem 1.6rem; margin-bottom:.9rem;
  cursor:pointer; transition:border-color .3s;
}
.mutual-card:hover { border-color:rgba(192,132,252,0.4); }
.mutual-q { font-size:.98rem; font-weight:500; }
.mutual-a {
  font-style:italic; font-size:.88rem; color:var(--accent);
  max-height:0; overflow:hidden;
  transition:max-height .4s, opacity .4s, margin .4s;
  opacity:0; margin-top:0;
}
.mutual-card.open .mutual-a { max-height:100px; opacity:1; margin-top:.65rem; }

/* CLOSE */
#slide-close { background:var(--deep); text-align:center; }
.close-q   { font-family:var(--font-d); font-size:clamp(1.1rem,2.5vw,1.5rem); font-style:italic; color:var(--muted); margin-bottom:1.25rem; }
.close-yes { font-family:var(--font-d); font-size:clamp(4rem,12vw,8rem); font-weight:700; color:var(--amber); line-height:1; margin-bottom:1.25rem; }
.close-br  { font-size:.95rem; color:var(--muted); margin-bottom:2rem; }
.chant-box {
  display:inline-block; border:1.5px solid var(--accent); border-radius:.75rem;
  padding:1rem 2.5rem; font-family:var(--font-d); font-size:clamp(1.2rem,3vw,1.9rem);
  font-weight:700; color:var(--accent); margin-bottom:2.5rem;
}
.restart-btn {
  font-family:var(--font-b); font-size:.78rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); background:none;
  border:1px solid rgba(123,111,160,0.25); border-radius:2rem;
  padding:.55rem 1.4rem; cursor:pointer; transition:all .3s;
}
.restart-btn:hover { color:var(--white); border-color:var(--muted); }

.sec-head { text-align:center; margin-bottom:2.5rem; max-width:700px; width:100%; }
.sec-head h2 { font-family:var(--font-d); font-size:clamp(1.5rem,3.5vw,2.2rem); font-weight:700; margin-bottom:.4rem; }
.sec-head p  { font-size:.88rem; color:var(--muted); }

@keyframes fu { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

@media (max-width:640px) {
  .how-grid { grid-template-columns:1fr; max-width:360px; }
  #nav-dots { display:none; }
}
</style>
</head>
<body>
<div id="progress-bar" style="width:0%"></div>
<div id="nav-dots"></div>
<div id="app"></div>

<script>
const situations = [
  {type:'lo',num:1,world:"Hell",
   situation:"We worked very hard... but still failed.",
   feelings:["Hopeless","Broken","Defeated","Trapped"],
   cue:"\"That heavy, hopeless feeling — that is Hell. Not after death. Right here, in this moment.\"",
   desc:"A state of rage and despair from bitter frustration. Living itself feels painful. Completely lacking in freedom."},
  {type:'lo',num:2,world:"Hunger",
   situation:"We keep checking our phone, waiting for someone's reply.",
   feelings:["Restless","Desperate","Insecure","Anxious"],
   cue:"\"Always chasing, never fulfilled. Tormented by insatiable craving.\"",
   desc:"Spiritually and physically tormented by insatiable wanting — more attention, more certainty, more."},
  {type:'lo',num:3,world:"Animality",
   situation:"Someone criticizes us in front of others.",
   feelings:["Defensive","Reactive","Impulsive","Cornered"],
   cue:"\"Instinct over thinking. Moral judgment goes offline. Pure survival mode.\"",
   desc:"Moved by impulse, concerned only with immediate self-protection. Moral judgment is absent."},
  {type:'lo',num:4,world:"Anger",
   situation:"Our friend achieves something big.",
   feelings:["Jealous","Competitive","Threatened","\"Why not me?\""],
   cue:"\"Comparison-based living. An obsession with personal superiority.\"",
   desc:"A distortion that masks itself as ambition. Always comparing, wanting to be better than others."},
  {type:'lo',num:5,world:"Heaven",
   situation:"We get something we really wanted.",
   feelings:["Happy","Excited","Thrilled","Relieved"],
   cue:"Ask: \"How long does that happiness last?\" — pause and wait for their answer.",
   desc:"A real joy — but temporary. It fades with the passage of time and as situations change."},
  {type:'hi',num:6,world:"Humanity",
   situation:"We pause before reacting and choose calm words.",
   feelings:["Balanced","Mature","Peaceful","Composed"],
   cue:"\"We pause. We choose. That is Humanity — a calm, humane state where we strive to control impulse.\"",
   desc:"A state where we strive to control impulse through reason. We know the difference between good and evil."},
  {type:'hi',num:7,world:"Learning",
   situation:"We listen to guidance and feel inspired to grow.",
   feelings:["Curious","Motivated","Inspired","Open"],
   cue:"\"Seeking truth. Awakening through the teachings of others.\"",
   desc:"Gaining partial awakening through listening to Buddhist teachings. Understanding that attachment causes suffering."},
  {type:'hi',num:8,world:"Realization",
   situation:"During chanting, something suddenly feels clear.",
   feelings:["Clarity","Understanding","Something clicked","Confidence"],
   cue:"\"Awakening through one's own observation and effort. Inner clarity — not given, but found.\"",
   desc:"A direct sense of life's impermanence arrived at through one's own effort and observation."},
  {type:'hi',num:9,world:"Bodhisattva",
   situation:"We help someone even when we are struggling.",
   feelings:["Compassionate","Warm","Fulfilled","Strong"],
   cue:"\"Strength expressed as care. Empathy for others' pain and a desire to relieve it.\"",
   desc:"Striving for enlightenment by compassionately working for the happiness of all."},
  {type:'hi',num:10,world:"Buddhahood",
   situation:"After failure, we say: \"I will try again.\"",
   feelings:["Determined","Courageous","Unshakable","Hopeful"],
   cue:"\"Not freedom from problems — but vibrant wisdom to overcome all of them.\"",
   desc:"Absolute, indestructible life force. Infinite compassion and wisdom. The supreme state inherent in each of us."},
];

const mutuals = [
  {q:"Have we ever felt jealous... but still congratulated someone?",a:"That means Bodhisattva existed inside Anger."},
  {q:"Have we ever felt hopeless... but still tried again?",a:"That means Buddhahood existed inside Hell."},
  {q:"Are we only one feeling?",a:"No. Every world contains all ten within it. We can move — from hopeless to determined, from jealousy to compassion — at any moment."},
];

// Slide map: 0=title 1=how 2..11=situations 12=mutual 13=close
const TOTAL = 14;
let cur = 0;
let steps = new Array(10).fill(0); // 0=situation, 1=feelings, 2=world
let mutualOpen = {};

function getType(i) {
  if (i===0) return 'title';
  if (i===1) return 'how';
  if (i>=2&&i<=11) return 'situation';
  if (i===12) return 'mutual';
  return 'close';
}
function si(idx) { return idx-2; }
function pct() { return Math.round(cur/(TOTAL-1)*100); }

function updateProgress() {
  document.getElementById('progress-bar').style.width = pct()+'%';
  document.querySelectorAll('.nav-dot').forEach((d,i)=>{
    d.classList.remove('active','done');
    if (i===cur) d.classList.add('active');
    else if (i<cur) d.classList.add('done');
  });
}

function goTo(idx) {
  cur = Math.max(0,Math.min(TOTAL-1,idx));
  render(); updateProgress(); window.scrollTo(0,0);
}

function advanceStep(i) {
  if (steps[i]<2) { steps[i]++; render(); }
}

function buildDots() {
  const el = document.getElementById('nav-dots');
  el.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='nav-dot';
    d.onclick=()=>goTo(i);
    el.appendChild(d);
  }
}

function render() {
  const app=document.getElementById('app');
  const type=getType(cur);

  if (type==='title') {
    app.innerHTML=`
    <div class="slide" id="slide-title">
      <div class="orb orb-1"></div><div class="orb orb-2"></div>
      <p class="t-eyebrow">Nichiren Buddhism</p>
      <h1 class="t-main">The Ten<br>Worlds</h1>
      <p class="t-sub">Understanding the states of life that live within each of us, right now.</p>
      <div class="pips-row">
        ${situations.map(s=>`<div class="pip ${s.type}" title="${s.world}">${s.num}</div>`).join('')}
      </div>
      <button class="start-btn" onclick="goTo(1)">Begin the session &nbsp;→</button>
    </div>`;
  }

  else if (type==='how') {
    app.innerHTML=`
    <div class="slide" id="slide-how">
      <div style="max-width:820px;width:100%">
        <div class="sec-head">
          <h2>How this works</h2>
          <p>A live audience exercise — 10 situations, one at a time</p>
        </div>
        <div class="how-grid">
          ${[{n:'1',t:'Read the situation',b:'A real-life moment is shown. Picture yourself there.'},
             {n:'2',t:'Audience shouts the feeling',b:'No Buddhist terms. Just the raw emotion — out loud, together.'},
             {n:'3',t:'Reveal the world',b:'After the audience responds, tap to reveal the life state.'}]
            .map(h=>`<div class="how-card"><div class="how-num">${h.n}</div><div class="how-title">${h.t}</div><div class="how-body">${h.b}</div></div>`)
            .join('')}
        </div>
        <div class="nav-row" style="margin-top:2.5rem">
          <button class="nbtn" onclick="goTo(0)">← Back</button>
          <button class="nbtn primary" onclick="goTo(2)">Begin →</button>
        </div>
      </div>
    </div>`;
  }

  else if (type==='situation') {
    const i  = si(cur);
    const s  = situations[i];
    const st = steps[i];
    const c  = s.type;
    const showFeelings = st>=1;
    const showWorld    = st>=2;
    const isLast = cur===11;

    const stepDots = [0,1,2].map(d=>
      `<div class="step-dot ${d<st?'s-done':d===st?'s-active':''}"></div>`
    ).join('');

    const roundLabel = i<5 ? 'Round 1 — Raw emotions' : 'Round 2 — Higher worlds';

    app.innerHTML=`
    <div class="sit-slide">
      <div class="world-counter">World ${s.num} / 10 &nbsp;·&nbsp; ${roundLabel}</div>
      <div class="step-indicator">${stepDots}</div>

      <div class="sit-situation">${s.situation}</div>

      ${showFeelings?`
      <div class="feelings-section">
        <div class="feelings-label">The audience shouts...</div>
        <div class="feelings-grid">
          ${s.feelings.map(f=>`<div class="feeling-tile ${c}">${f}</div>`).join('')}
        </div>
      </div>`:''}

      ${showWorld?`
      <div class="world-reveal-section">
        <div class="world-reveal-card ${c}">
          <div class="world-of ${c}">The world of</div>
          <div class="world-name ${c}">${s.world}</div>
          <div class="world-desc">${s.desc}</div>
          <div class="world-cue">${s.cue}</div>
        </div>
      </div>`:''}

      ${st<2?`<button class="reveal-btn ${c}-btn" onclick="advanceStep(${i})">
        ${st===0?'Reveal feelings':'Reveal the world'} <span class="arr-icon">→</span>
      </button>`:''}

      <div class="nav-row" style="margin-top:2rem">
        ${st>0
          ? `<button class="nbtn" onclick="steps[${i}]=0;render()">↺ Reset</button>`
          : `<button class="nbtn" onclick="goTo(${cur-1})">← Back</button>`}
        ${showWorld
          ? `<button class="nbtn primary" onclick="goTo(${isLast?12:cur+1})">${isLast?'Wrap up →':'Next world →'}</button>`
          : ''}
      </div>
    </div>`;
  }

  else if (type==='mutual') {
    app.innerHTML=`
    <div class="slide" id="slide-mutual">
      <div class="mutual-inner">
        <div class="sec-head" style="text-align:left">
          <h2>Mutual possession</h2>
          <p>Every world contains all ten within it. Ask the audience:</p>
        </div>
        ${mutuals.map((m,i)=>`
        <div class="mutual-card ${mutualOpen[i]?'open':''}" onclick="toggleMutual(${i})">
          <p class="mutual-q">${m.q}</p>
          <p class="mutual-a">${m.a}</p>
        </div>`).join('')}
        <div class="nav-row" style="margin-top:2rem">
          <button class="nbtn" onclick="goTo(11)">← Back</button>
          <button class="nbtn primary" onclick="goTo(13)">Closing →</button>
        </div>
      </div>
    </div>`;
  }

  else {
    app.innerHTML=`
    <div class="slide" id="slide-close">
      <p class="close-q">Can we move from hopeless to determined?</p>
      <div class="close-yes">Yes.</div>
      <p class="close-br">And how do we activate our highest life state?</p>
      <div class="chant-box">Nam-Myoho-Renge-Kyo</div><br>
      <button class="restart-btn" onclick="cur=0;steps.fill(0);mutualOpen={};goTo(0)">↺ &nbsp;Start over</button>
    </div>`;
  }

  updateProgress();
}

function toggleMutual(i) { mutualOpen[i]=!mutualOpen[i]; render(); }

document.addEventListener('keydown', e=>{
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') {
    e.preventDefault();
    if (getType(cur)==='situation') {
      const i=si(cur);
      if (steps[i]<2) { advanceStep(i); return; }
      if (steps[i]===2) { goTo(cur+1); return; }
    }
    goTo(cur+1);
  }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
    e.preventDefault(); goTo(cur-1);
  }
});

buildDots(); render(); updateProgress();
</script>
</body>
</html>
